<!-- Indentación: el <section> es el padre, todo lo de adentro va un nivel más indentado -->
<section class="tarjeta-curso">
    <!-- class descriptivo, minúsculas, sin espacios -->

    <!-- Atributos siempre con comillas: src="...", alt="...", class="..." -->
    <!-- alt describe REALMENTE la imagen, nunca se deja vacío -->
    <img
        src="https://placehold.co/120x120"
        alt="Logo del curso de desarrollo web"
        class="logo-curso"
    />

    <!-- Etiqueta abierta y cerrada correctamente -->
    <h2 class="titulo-curso">Fundamentos de Desarrollo Web</h2>

    <!-- Etiqueta abierta y cerrada correctamente -->
    <p class="descripcion-curso">
        Aprende HTML y CSS desde cero, sin instalar nada.
    </p>
</section>
